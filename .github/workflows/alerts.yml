name: Alert-Delivery-Agent

on:
  schedule:
    - cron: '0 8 * * *'   # Täglich um 08:00 UTC
  workflow_dispatch:        # Manuell auslösbar im GitHub UI

jobs:
  alerts:
    name: Alerts prüfen und E-Mails senden
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Alert-Delivery ausführen
        run: npm run start -w @intellistream/agents-alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
