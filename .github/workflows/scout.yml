name: Scout Agent

on:
  schedule:
    - cron: '0 * * * *'   # Stündlich um :00 Uhr UTC
  workflow_dispatch:        # Manuell auslösbar im GitHub UI

jobs:
  scout:
    name: Artikel einsammeln
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Scout — Energie & Erneuerbare
        run: npm run start -w @intellistream/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Finanzen & Kapitalmarkt
        run: npm run start:finance -w @intellistream/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Recht & Compliance
        run: npm run start:recht -w @intellistream/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — IT & Cybersecurity
        run: npm run start:it -w @intellistream/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Automotive & Mobilität
        run: npm run start:automotive -w @intellistream/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
