name: Scout Agent

on:
  schedule:
    - cron: '0 * * * *'   # Stündlich um :00 Uhr UTC
  workflow_dispatch:        # Manuell auslösbar im GitHub UI

jobs:
  scout:
    name: Artikel einsammeln
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm auf v11 upgraden
        run: npm install -g npm@11

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Scout — Energie & Erneuerbare
        run: npm run start -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Finanzen & Kapitalmarkt
        run: npm run start:finance -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Recht & Compliance
        run: npm run start:recht -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — IT & Cybersecurity
        run: npm run start:it -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Automotive & Mobilität
        run: npm run start:automotive -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — ESG & Nachhaltigkeit
        run: npm run start:esg -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Pharma & Life Science
        run: npm run start:pharma -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Bau & Immobilien
        run: npm run start:bau -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Gesundheit & MedTech
        run: npm run start:gesundheit -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Maschinenbau & Industrie 4.0
        run: npm run start:maschinenbau -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — EU-Regulatorik & Gesetzgebung
        run: npm run start:eu -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — HR & Arbeitsmarkt
        run: npm run start:hr -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Logistik & Transport
        run: npm run start:logistik -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Versicherung & Risiko
        run: npm run start:versicherung -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scout — Chemie & Materialien
        run: npm run start:chemie -w @distillfeed/agents-scout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Nach erfolgreichem Scout direkt den Processor anstoßen
      - name: Processor anstoßen
        if: success()
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/processor.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Processor-Workflow angestoßen"

      - name: Alert bei Fehler
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"IntelliStream Alerts <alerts@distillfeed.eu>\",
              \"to\": [\"koerbe-wellig4m@icloud.com\"],
              \"subject\": \"[IntelliStream] ⚠️ Scout-Workflow fehlgeschlagen\",
              \"html\": \"<h2>Scout-Workflow Fehler</h2><p>Der Scout-Agent (stündlich) ist fehlgeschlagen.</p><p><a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Logs ansehen →</a></p><small>${{ github.run_id }} · $(date -u)</small>\"
            }"
