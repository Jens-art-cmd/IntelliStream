name: Processor Agent

on:
  schedule:
    - cron: '15 * * * *'  # Stündlich um :15 Uhr UTC (nach dem Scout)
  workflow_dispatch:        # Manuell auslösbar im GitHub UI

jobs:
  processor:
    name: Artikel verarbeiten (Summary + Scoring)
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm auf v11 upgraden
        run: npm install -g npm@11

      - name: Abhängigkeiten installieren
        run: npm install

      # Kostenlimit: max 300 Artikel/Tag (PROCESSOR_DAILY_LIMIT), Batch 15
      # → max ~$1.95/Tag (~€58/Monat bei 15 Branchen). Deckt ~80% der tägl. Neuzugänge ab.
      # Der Processor prüft selbst ob das Tageslimit erreicht ist — läuft 1×/Stunde
      # und bricht automatisch ab wenn kein Budget mehr übrig.
      # Hinweis: Kein Guthaben bei Anthropic = keine Kosten, Limit ist dann irrelevant.
      - name: Processor — unverarbeitete Artikel (mit Tageslimit)
        run: npm run start -w @distillfeed/agents-processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          PROCESSOR_BATCH: "15"
          PROCESSOR_DAILY_LIMIT: "300"

      - name: Embedder — Vektoren für neue Artikel generieren
        run: npm run start:embed -w @distillfeed/agents-processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Alert bei Fehler
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"IntelliStream Alerts <alerts@distillfeed.eu>\",
              \"to\": [\"koerbe-wellig4m@icloud.com\"],
              \"subject\": \"[IntelliStream] ⚠️ Processor-Workflow fehlgeschlagen\",
              \"html\": \"<h2>Processor-Workflow Fehler</h2><p>Der Processor-Agent (stündlich :15) ist fehlgeschlagen. Artikel werden nicht verarbeitet und erscheinen nicht im Feed.</p><p><a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Logs ansehen →</a></p><small>${{ github.run_id }} · $(date -u)</small>\"
            }"
