name: Trial-Reminder-Agent

on:
  schedule:
    - cron: '30 8 * * *'   # Täglich um 08:30 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-Run (keine E-Mails senden, nur Logs)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  trial-reminder:
    name: Trial-Erinnerungen versenden
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Trial-Reminder ausführen
        working-directory: packages/agents/trial-reminder
        run: npx tsx src/index.ts
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:          ${{ secrets.RESEND_FROM }}
          APP_URL:              ${{ secrets.APP_URL }}
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
